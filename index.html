<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <!-- SEO -->
    <link rel="canonical" href="https://phuctravel.com/">

    <!-- Redirect -->
    <meta http-equiv="refresh" content="0; url=https://phuctravel.com/">

    <script>
        window.location.replace("https://phuctravel.com/");
    </script>
</head>
<body>
    <p>Website đã chuyển sang <a href="https://phuctravel.com/">https://phuctravel.com/</a></p>
</body>
</html>
